services:
  # ── PostgreSQL ──────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: sqat_postgres
    environment:
      POSTGRES_DB: sqat
      POSTGRES_USER: sqat
      POSTGRES_PASSWORD: sqat_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sqat -d sqat"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ── RabbitMQ ─────────────────────────────────────────────────────────────────
  rabbitmq:
    image: rabbitmq:3-management
    container_name: sqat_rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"    # Management UI
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 15s
      timeout: 10s
      retries: 5
    restart: unless-stopped

  # ── FastAPI Server ────────────────────────────────────────────────────────────
  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: sqat_server
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+psycopg2://sqat:sqat_password@postgres:5432/sqat
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672/
      # Override these via .env or docker-compose.override.yml for real credentials
      GROQ_API_KEY: ${GROQ_API_KEY:-}
      NIM_API_KEY: ${NIM_API_KEY:-}
      LLM_PROVIDER: ${LLM_PROVIDER:-groq}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-change-me-in-prod-use-32plus-chars}
      BASE_URL: ${BASE_URL:-http://localhost:3000}
      USER_EMAIL: ${USER_EMAIL:-}
      USER_PASSWORD: ${USER_PASSWORD:-}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-}
      PUBLIC_API_URL: ${PUBLIC_API_URL:-http://localhost:8000}
    volumes:
      - ./server/uploads:/app/uploads
      - ./server/tests/generated:/app/tests/generated
      - server_state:/app/state
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ── Next.js Client ───────────────────────────────────────────────────────────
  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: sqat_client
    depends_on:
      server:
        condition: service_healthy
    environment:
      NEXT_PUBLIC_API_URL: ${PUBLIC_API_URL:-http://localhost:8000}
    ports:
      - "3000:3000"
    restart: unless-stopped

volumes:
  postgres_data:
  rabbitmq_data:
  server_state:
