services:
  # PostgreSQL
  postgres:
    image: postgres:16-alpine
    container_name: sqat_postgres
    environment:
      POSTGRES_DB: sqat
      POSTGRES_USER: sqat
      POSTGRES_PASSWORD: sqat_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sqat -d sqat"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # RabbitMQ
  rabbitmq:
    image: rabbitmq:3-management
    container_name: sqat_rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 15s
      timeout: 10s
      retries: 5
    restart: unless-stopped

  # FastAPI server
  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: sqat_server
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+psycopg2://sqat:sqat_password@postgres:5432/sqat
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672/
      GROQ_API_KEY: ${GROQ_API_KEY:-}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      NIM_API_KEY: ${NIM_API_KEY:-}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      LLM_PROVIDER: ${LLM_PROVIDER:-groq}
      LLM_FALLBACK_CHAIN: ${LLM_FALLBACK_CHAIN:-groq,gemini,openrouter,nim}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-change-me-in-prod-use-32plus-chars}
      BASE_URL: ${BASE_URL:-http://localhost:3000}
      USER_EMAIL: ${USER_EMAIL:-}
      USER_PASSWORD: ${USER_PASSWORD:-}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-}
      PUBLIC_API_URL: ${PUBLIC_API_URL:-http://localhost:8000}
      PHASE3_EMBEDDED_WORKERS: ${PHASE3_EMBEDDED_WORKERS:-false}
      PHASE3_EXTERNAL_RUN_TIMEOUT_S: ${PHASE3_EXTERNAL_RUN_TIMEOUT_S:-3600}
      STATE_JSON_PATH: /app/state/state.json
    volumes:
      - ./server/uploads:/app/uploads
      - ./server/tests/generated:/app/tests/generated
      - server_state:/app/state
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # Phase 3 execution worker
  phase3-worker:
    build:
      context: ./server
      dockerfile: Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    command: ["python", "-m", "app.services.phase3_worker"]
    environment:
      DATABASE_URL: postgresql+psycopg2://sqat:sqat_password@postgres:5432/sqat
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672/
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-change-me-in-prod-use-32plus-chars}
      GROQ_API_KEY: ${GROQ_API_KEY:-}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      NIM_API_KEY: ${NIM_API_KEY:-}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      LLM_PROVIDER: ${LLM_PROVIDER:-groq}
      LLM_FALLBACK_CHAIN: ${LLM_FALLBACK_CHAIN:-groq,gemini,openrouter,nim}
      BASE_URL: ${BASE_URL:-http://localhost:3000}
      PLAYWRIGHT_HEADED: ${PLAYWRIGHT_HEADED:-false}
      PLAYWRIGHT_SLOW_MO_MS: ${PLAYWRIGHT_SLOW_MO_MS:-0}
      TEST_TIMEOUT_MS: ${TEST_TIMEOUT_MS:-180000}
      STATE_JSON_PATH: /app/state/state.json
    volumes:
      - ./server/uploads:/app/uploads
      - ./server/tests:/app/tests
      - server_state:/app/state
    restart: unless-stopped

  # Next.js client
  client:
    build:
      context: ./client
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_BASE_URL: ${PUBLIC_API_URL:-http://localhost:8000}
    container_name: sqat_client
    depends_on:
      server:
        condition: service_healthy
    environment:
      NEXT_PUBLIC_API_BASE_URL: ${PUBLIC_API_URL:-http://localhost:8000}
    ports:
      - "3000:3000"
    restart: unless-stopped

volumes:
  postgres_data:
  rabbitmq_data:
  server_state:
